name: 'Terraform - HIT2 (Cloud Bursting)'

on:
  push:
    branches:
      - main
    paths:
      - 'tp3/HIT2/terraform/**'
  pull_request:
    paths:
      - 'tp3/HIT2/terraform/**'

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest

    # Se asume que los secretos y variables de entorno de GCP están configurados
    # en los settings del repositorio: GCP_CREDENTIALS, GCP_PROJECT_ID
    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      # No necesitamos TF_VAR_rabbitmq_host aquí porque en hit2 el orquestador corre local

    defaults:
      run:
        working-directory: tp3/HIT2/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/996435690701/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'terraform-bot@proyecto-sobel-grupo404.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        continue-on-error: true

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
