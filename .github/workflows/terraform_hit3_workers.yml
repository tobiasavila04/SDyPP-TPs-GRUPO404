name: 'Pipeline 2 - Workers Dinámicos (HIT3)'

on:
  workflow_dispatch:
    inputs:
      worker_count:
        description: 'Cantidad de workers a levantar en GCP'
        required: true
        default: '2'
        type: string
      action:
        description: 'Acción a realizar (apply/destroy)'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  manage_workers:
    name: 'Manage External Workers'
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_worker_count: ${{ inputs.worker_count }}
      TF_VAR_worker_image: ${{ secrets.DOCKERHUB_USERNAME }}/sobel-app:latest

    defaults:
      run:
        working-directory: tp3/HIT3/terraform/workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Auth to GCP (necesario para obtener la IP del LoadBalancer de RabbitMQ)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/996435690701/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'terraform-bot@proyecto-sobel-grupo404.iam.gserviceaccount.com'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: sobel-cluster
          location: us-central1-a
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Obtener IP de RabbitMQ
        id: rabbit_ip
        run: |
          # Esperar a que el LoadBalancer tenga IP externa
          IP=""
          while [ -z $IP ]; do
            IP=$(kubectl get svc rabbitmq -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            [ -z "$IP" ] && sleep 5
          done
          echo "RABBIT_HOST=$IP" >> $GITHUB_ENV
          echo "IP del RabbitMQ obtenida: $IP"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_rabbitmq_host: ${{ env.RABBIT_HOST }}

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false
        env:
          TF_VAR_rabbitmq_host: ${{ env.RABBIT_HOST }}
