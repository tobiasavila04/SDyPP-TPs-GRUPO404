name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run Tests (TP1)
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check . --fix --line-length 150

      - name: Format check (ruff format)
        run: ruff format --check . --line-length 150

      - name: Run tests
        run: pytest tp1/tests/ -v --tb=short

  lint-tp2:
    name: Lint TP2 (HIT1, HIT2, HIT3)
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r tp2/HIT1/requirements.txt
          pip install -r tp2/HIT2/requirements.txt
          pip install -r tp2/HIT3/requirements.txt

      - name: Lint (ruff check)
        run: ruff check tp2/ --line-length 150

      - name: Format check (ruff format)
        run: ruff format --check tp2/ --line-length 150

  build-tp2:
    name: Build Docker Images (TP2)
    runs-on: ubuntu-latest
    needs: [secret-scan, lint-tp2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build HIT1 image
        run: docker build -t hit1-task-server tp2/HIT1/

      - name: Build HIT3 images
        run: docker compose -f tp2/HIT3/docker-compose.yml build

  lint-tp3:
    name: Lint TP3
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Lint (ruff check)
        run: ruff check tp3/ --line-length 150

      - name: Format check (ruff format)
        run: ruff format --check tp3/ --line-length 150

  test-tp3:
    name: Run Tests (TP3)
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install TP3 dependencies
        run: pip install -r tp3/requirements-test.txt

      - name: Run TP3 tests with coverage
        run: pytest tp3/tests/ -v --tb=short --cov=tp3 --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: tp3-coverage
          path: coverage.xml

  build-tp3:
    name: Build Docker Images (TP3)
    runs-on: ubuntu-latest
    needs: [secret-scan, lint-tp3, test-tp3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Stage 2 worker image
        run: docker build -t sobel-worker tp3/HIT1/parte_2_distribuido/worker/

      - name: Build Stage 3 worker image
        run: docker build -t sobel-worker-ft tp3/HIT1/parte_3_fault_tolerant/worker/

      - name: Build HIT0 patron 1 image
        run: docker build -t rabbitmq-patron1 tp3/HIT0/patron_1_queue/

      - name: Build HIT0 patron 2 image
        run: docker build -t rabbitmq-patron2 tp3/HIT0/patron_2_pubsub/

      - name: Build HIT0 patron 3 image
        run: docker build -t rabbitmq-patron3 tp3/HIT0/patron_3_dlq/

      - name: Build HIT0 patron 4 image
        run: docker build -t rabbitmq-patron4 tp3/HIT0/patron_4_retry/

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [secret-scan, test, lint-tp2, build-tp2, test-tp3, build-tp3]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Execute Deploy Script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            bash /home/ubuntu/SD2026-GRUPO404-TP1/scripts/deploy.sh