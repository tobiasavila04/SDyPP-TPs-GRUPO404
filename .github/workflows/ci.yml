name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test 
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Execute SSH Commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            # 1. Navegamos a la carpeta del repositorio en el servidor
            cd /home/ubuntu/SD2026-GRUPO404

            # 2. Traemos los últimos cambios de main
            git pull origin main

            # 3. Activamos entorno virtual
            source .venv/bin/activate

            # 4. Instalamos dependencias de producción
            pip install -r requirements.txt

            # 5. Reiniciamos el servicio Node D (HIT #6 — registro de contactos)
            sudo systemctl restart api-python.service