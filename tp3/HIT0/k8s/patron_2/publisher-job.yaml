apiVersion: batch/v1
kind: Job
metadata:
  name: pubsub-publisher
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pubsub-publisher
          image: rabbitmq-patron2:latest
          imagePullPolicy: Never
          command: ["python", "publisher.py"]
          env:
            - name: RABBIT_HOST
              value: "rabbitmq-service"
