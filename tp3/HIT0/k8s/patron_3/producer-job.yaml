apiVersion: batch/v1
kind: Job
metadata:
  name: dlq-producer
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: dlq-producer
          image: rabbitmq-patron3:latest
          imagePullPolicy: Never
          command: ["python", "producer.py"]
          env:
            - name: RABBIT_HOST
              value: "rabbitmq-service"
