apiVersion: apps/v1
kind: Deployment
metadata:
  name: sobel-worker
  labels:
    app: sobel-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sobel-worker
  template:
    metadata:
      labels:
        app: sobel-worker
    spec:
      containers:
        - name: sobel-worker
          image: sobel-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: RABBIT_HOST
              value: "rabbitmq-service"
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
