upstream backend_nodes {
    server node1:7001;
    server node2:7002;
    server node3:7003;
}

server {
    listen 80;

    location / {
        proxy_pass http://backend_nodes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend_nodes;
        proxy_set_header Host $host;
    }
}
